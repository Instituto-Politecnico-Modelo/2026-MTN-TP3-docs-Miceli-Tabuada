spring.application.name=backEnd

# -----------------------------------------------
# H2 - Base de datos en memoria (temporal)
# Cuando MySQL esté disponible, comentar estas
# líneas y descomentar la sección MySQL de abajo
# -----------------------------------------------
spring.datasource.url=jdbc:h2:mem:futbol5ya_db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Consola web de H2 (para ver los datos en el navegador)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# -----------------------------------------------
# MySQL (descomentar cuando esté disponible)
# -----------------------------------------------
# spring.datasource.url=jdbc:mysql://localhost:3306/futbol5ya_db?createDatabaseIfNotExist=true&serverTimezone=UTC
